name: BRI Weekly Blog Agent

on:
  schedule:
    - cron: '0 14 * * MON'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'publish'
        type: choice
        options:
          - publish
          - draft
          - dry-run

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            echo "mode=publish" >> $GITHUB_OUTPUT
          fi

      - name: Run BRI Blog Agent
        env:
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          GH_PAT:                ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:               carltonjr03/carltonjr03.github.io
          GH_BRANCH:             main
          POSTS_DIR:             _posts
          DRAFTS_DIR:            _drafts
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          if [ "$MODE" = "dry-run" ]; then
            python blog_agent.py --dry-run
          elif [ "$MODE" = "draft" ]; then
            python blog_agent.py --draft
          else
            python blog_agent.py
          fi

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blog-run-log-${{ github.run_id }}
          path: posts_log/run_log.json
          if-no-files-found: ignore
